# lib/fatty/config_files/themes/terminal.yml

# This theme is meant to inherit whatever color scheme the invoking terminal uses.
name: terminal
inherit: null

output:
  fg: default
  bg: default

input:
  fg: default
  bg: default

input_suggestion:
  fg: default
  bg: default
  attrs: [dim]

cursor:
  fg: default
  bg: default
  attrs: [reverse]

region:
  fg: default
  bg: default
  attrs: [reverse]

info:
  fg: default
  bg: default

good:
  fg: default
  bg: default
  attrs: [bold]

warn:
  fg: default
  bg: default
  attrs: [reverse]

error:
  fg: default
  bg: default
  attrs: [bold, reverse]

pager_status:
  fg: default
  bg: default
  attrs: [reverse]

search_input:
  fg: default
  bg: default
  attrs: [reverse]

match_current:
  fg: default
  bg: default
  attrs: [reverse]

match_other:
  fg: default
  bg: default
  attrs: [underline]

popup:
  fg: default
  bg: default

popup_selection:
  fg: default
  bg: default
  attrs: [reverse]

popup_input:
  fg: default
  bg: default
  attrs: [reverse]

popup_frame:
  fg: default
  bg: default
  border: single
  corners: square

popup_counts:
  fg: default
  bg: default
  attrs: [bold]

markdown_h1:
  fg: default
  bg: default
  attrs: [bold]

markdown_h2:
  fg: default
  bg: default
  attrs: [bold]

markdown_h3:
  fg: default
  bg: default
  attrs: [bold]

markdown_code:
  fg: default
  bg: default
  attrs: [reverse]

markdown_code_gutter:
  fg: default
  bg: default
  attrs: [dim]

markdown_strong:
  fg: default
  bg: default
  attrs: [bold]

markdown_emphasis:
  fg: default
  bg: default
  attrs: [italic]

markdown_link:
  fg: default
  bg: default
  attrs: [underline]

markdown_url:
  fg: default
  bg: default
  attrs: [underline]

markdown_quote_gutter:
  fg: default
  bg: default
  attrs: [dim]

markdown_highlight:
  fg: default
  bg: default
  attrs: [reverse]

markdown_table_header:
  fg: default
  bg: default
  attrs: [bold]

markdown_hrule:
  fg: default
  bg: default
  attrs: [dim]
